<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>Braises Ascendantes — Preview</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #0A0A0F;
    color: #fde68a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
  }
  .frame {
    position: relative;
    width: min(900px, 96vw);
    height: min(560px, 82vh);
    margin: 3vh auto;
    border-radius: 18px;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 100%, rgba(234,88,12,0.22), transparent 60%),
      linear-gradient(180deg, #1a0f0a 0%, #0b0710 65%, #050308 100%);
    border: 1px solid rgba(245,158,11,0.22);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), inset 0 0 60px rgba(234,88,12,0.08);
  }
  .label {
    position: absolute;
    top: 20px; left: 24px;
    z-index: 2;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(253,230,138,0.72);
  }
  .title {
    position: absolute;
    top: 42px; left: 24px;
    z-index: 2;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: #fef3c7;
    text-shadow: 0 2px 20px rgba(245,158,11,0.35);
  }
  .hint {
    position: absolute;
    bottom: 20px; left: 24px;
    z-index: 2;
    font-size: 10px;
    color: rgba(255,255,255,0.35);
  }
  .ember {
    position: absolute;
    bottom: -10px;
    border-radius: 50%;
    background: #fef3c7;
    box-shadow:
      0 0 10px rgba(254,243,199,1),
      0 0 22px rgba(251,191,36,0.9),
      0 0 40px rgba(245,158,11,0.6),
      0 0 60px rgba(234,88,12,0.35);
  }
  @keyframes ember-rise {
    0%   { transform: translateY(0) translateX(0); opacity: 0; }
    15%  { opacity: 1; }
    100% { transform: translateY(-120vh) translateX(var(--ember-drift, 8px)); opacity: 0; }
  }
</style>
</head>
<body>

<div class="frame">
  <div class="label">✦ Screen Animation · Légendaire</div>
  <div class="title">Braises Ascendantes</div>
  <div class="hint">28 braises dorées qui montent depuis le bas, en dérivant légèrement.</div>
  <div id="emberfield" style="position:absolute; inset:0; overflow:hidden;"></div>
</div>

<script>
  // Même seed arithmétique que BraisesAscendantesAnim (solarSet.tsx)
  const embers = Array.from({ length: 28 }, (_, i) => {
    const seed = (i + 1) * 37;
    return {
      left:     (seed * 11) % 100,
      delay:    ((seed * 5) % 60) / 10,
      duration: 4.5 + ((seed * 3) % 30) / 10,
      drift:    -18 + ((seed * 7) % 36),
      size:     3 + ((seed * 5) % 30) / 10,
    };
  });

  const field = document.getElementById('emberfield');
  for (const e of embers) {
    const d = document.createElement('div');
    d.className = 'ember';
    d.style.left      = e.left + '%';
    d.style.width     = e.size + 'px';
    d.style.height    = e.size + 'px';
    d.style.animation = `ember-rise ${e.duration}s linear ${e.delay}s infinite`;
    d.style.setProperty('--ember-drift', e.drift + 'px');
    field.appendChild(d);
  }
</script>

</body>
</html>
